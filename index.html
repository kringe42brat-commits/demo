<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo App</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, sans-serif;
    background:#f5f5f7;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card {
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    width:100%;
    max-width:340px;
    padding:28px;
  }
  h1 { font-size:18px; margin-bottom:18px; text-align:center; }

  input {
    width:100%;
    padding:9px 10px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
  }
  .btn-fake {
    width:100%;
    padding:9px;
    background:#eee;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    color:#888;
    cursor:not-allowed;
    margin-bottom:16px;
  }

  .or { text-align:center; color:#999; font-size:12px; margin:14px 0; }

  .btn-sso {
    width:100%;
    padding:10px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-sso:hover { background:#333; }

  /* Профиль после входа — только аватар и кнопка */
  #profile { display:none; text-align:center; }
  #profile img {
    width:96px;        /* увеличенная аватарка */
    height:96px;
    border-radius:50%;
    margin-bottom:20px;
    background:#eee;
    display:block;
    margin-left:auto;
    margin-right:auto;
  }
  .btn-out {
    width:100%;
    padding:9px;
    background:#fff;
    border:1px solid #e33;
    color:#e33;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
  }
  .btn-out:hover { background:#ffe6e6; }
</style>
</head>
<body>

<div class="card">

  <!-- Форма входа -->
  <div id="login">
    <h1>Вход в приложение</h1>
    <input type="text" placeholder="Логин" disabled>
    <input type="password" placeholder="Пароль" disabled>
    <button class="btn-fake" disabled>Войти (демо, не работает)</button>
    <div class="or">или</div>
    <button class="btn-sso" id="ssoBtn">Войти через SSO</button>
  </div>

  <!-- Профиль (только аватар + выход) -->
  <div id="profile">
    <img id="avatar" src="" alt="Аватар">
    <button class="btn-out" id="logoutBtn">Выйти</button>
  </div>

</div>

<script>
  const SSO_URL = 'https://sso-service1.onrender.com';

  function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? decodeURIComponent(m[2]) : null;
  }
  function setCookie(name, value, days) {
    const exp = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)};expires=${exp};path=/`;
  }
  function deleteCookie(name) {
    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;
  }

  function decodeJwt(token) {
    try {
      const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(b64));
    } catch { return null; }
  }

  function showProfile(user) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('profile').style.display = 'block';
    // Устанавливаем только аватарку
    const avatar = document.getElementById('avatar');
    avatar.src = user.av || 'https://placehold.co/96';
    // Имя и email не показываем
  }

  function showLogin() {
    document.getElementById('login').style.display = 'block';
    document.getElementById('profile').style.display = 'none';
  }

  document.getElementById('ssoBtn').addEventListener('click', () => {
    const myUrl = window.location.origin + window.location.pathname;
    window.location.href = `${SSO_URL}/?return=${encodeURIComponent(myUrl)}`;
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    deleteCookie('sso_token');
    showLogin();
  });

  (function init() {
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get('token');

    if (tokenFromUrl) {
      history.replaceState(null, '', window.location.pathname);
      setCookie('sso_token', tokenFromUrl, 7);
      const user = decodeJwt(tokenFromUrl);
      if (user) { showProfile(user); return; }
    }

    const saved = getCookie('sso_token');
    if (saved) {
      const user = decodeJwt(saved);
      const expired = !user?.exp || (Date.now() / 1000) > user.exp;
      if (user && !expired) { showProfile(user); return; }
      deleteCookie('sso_token');
    }

    showLogin();
  })();
</script>

</body>
</html>
